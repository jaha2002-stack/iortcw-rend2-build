// Experimental r_dlightMode 2 stable material-light config.
// Use in console:
//   /exec rend2_dlightmode2_experimental.cfg

seta cl_renderer "rend2"

// This build stabilizes r_dlightMode 2 by avoiding the broken cubemap-shadow sampling
// and keeping the material dynamic-light path: normal/specular from .mtr can react.
seta r_dlightMode "2"

seta r_normalMapping "1"
seta r_specularMapping "1"
seta r_parallaxMapping "1"
seta r_parallaxMapShadows "0"

// Keep PBR off. Existing auto-generated maps are vanilla+/specular, not authored PBR.
seta r_pbr "0"

seta r_genNormalMaps "0"
seta r_ssao "0"
seta r_forceSun "0"
seta r_sunShadows "0"

seta r_hdr "1"
seta r_postProcess "1"
seta r_toneMap "1"

vid_restart
