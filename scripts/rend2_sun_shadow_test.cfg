// Sun shadow test using existing rend2 sun shadow path
// Console:
//   /exec rend2_sun_shadow_test.cfg

seta cl_renderer "rend2"

seta r_dlightMode "2"
seta r_dlightShadows "0"

seta r_normalMapping "1"
seta r_specularMapping "0"
seta r_parallaxMapping "1"
seta r_parallaxMapShadows "0"
seta r_pbr "0"

seta r_forceSun "1"
seta r_sunShadows "1"
seta r_shadowMapSize "1024"
seta r_shadowFilter "1"

seta r_hdr "1"
seta r_postProcess "1"
seta r_toneMap "1"

vid_restart
