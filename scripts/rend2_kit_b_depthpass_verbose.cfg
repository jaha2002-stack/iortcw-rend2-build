// Kit B verbose cubemap pass logging.
// Use briefly, it can spam console.
// Console:
//   /exec rend2_kit_b_depthpass_verbose.cfg

seta cl_renderer "rend2"
seta r_dlightMode "3"
seta r_dlightShadows "1"

seta r_dlightShadowDepthPass "1"
seta r_dlightShadowDepthFaces "6"
seta r_dlightShadowDepthCurrentView "1"

seta r_dlightShadowMaxLights "1"
seta r_dlightShadowMapSize "256"
seta r_dlightShadowBias "0.006"
seta r_dlightShadowFilter "0"
seta r_dlightShadowDebug "2"
seta r_dlightShadowDebugEvery "1"
seta r_dlightShadowMinRadius "1"
seta r_dlightShadowMinIntensity "0.001"

seta r_normalMapping "1"
seta r_specularMapping "0"
seta r_parallaxMapping "1"
seta r_pbr "0"

vid_restart
