// Kit D diagnostic: CUBEMAP SAMPLE visualization. Confirms u_ShadowMap is readable.
// After exec, stand near same torch/fire and observe.
// Then use /condump kit_d_3.txt

seta cl_renderer "rend2"
seta r_dlightMode "3"
seta r_dlightShadows "1"
seta r_dlightShadowDepthPass "1"
seta r_dlightShadowDepthFaces "6"
seta r_dlightShadowUseLightView "1"
seta r_dlightShadowMaxLights "1"
seta r_dlightShadowMapSize "256"
seta r_dlightShadowNear "2.0"
seta r_dlightShadowFarScale "1.0"
seta r_dlightShadowBias "0.006"
seta r_dlightShadowFilter "0"
seta r_dlightShadowDebug "1"
seta r_dlightShadowDebugEvery "60"
seta r_dlightShadowShaderLog "1"
seta r_dlightShadowShaderLogEvery "60"
seta r_dlightShadowMinRadius "32"
seta r_dlightShadowMinIntensity "0.05"
seta r_dlightShadowShaderStrength "0.85"
seta r_dlightShadowShaderBias "0.010"
seta r_dlightShadowShaderDebugScale "1.0"
seta r_normalMapping "1"
seta r_specularMapping "0"
seta r_parallaxMapping "1"
seta r_parallaxMapShadows "0"
seta r_pbr "0"
seta r_hdr "1"
seta r_postProcess "1"
seta r_toneMap "1"

seta r_dlightShadowShaderMode "3"
vid_restart
