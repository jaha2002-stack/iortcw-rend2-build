// iortcw rend2 enhanced dlight test config
// Copy to iortcw/main/ and run in console:
//   /exec rend2_dlightmode1_enhanced_test.cfg

seta cl_renderer "rend2"
seta r_dlightMode "1"

seta r_normalMapping "1"
seta r_specularMapping "1"
seta r_pbr "0"
seta r_parallaxMapping "1"
seta r_parallaxMapShadows "0"

seta r_ssao "0"
seta r_forceSun "0"
seta r_sunShadows "0"

seta r_hdr "1"
seta r_postProcess "1"
seta r_toneMap "1"

vid_restart
