// Very experimental preset: allow all dynamic shadow contributors
seta cl_renderer "rend2"
seta r_dlightMode "3"
seta r_dlightShadows "1"
seta r_dlightShadowMaxLights "2"
seta r_dlightShadowMapSize "256"
seta r_dlightShadowBias "0.005"
seta r_dlightShadowFilter "1"
seta r_dlightShadowTorchOnly "0"
seta r_dlightShadowExplosions "1"
seta r_dlightShadowMuzzle "1"

seta r_normalMapping "1"
seta r_specularMapping "0"
seta r_parallaxMapping "1"
seta r_parallaxMapShadows "0"
seta r_pbr "0"

seta r_pshadowDist "128"
seta r_hdr "1"
seta r_postProcess "1"
seta r_toneMap "1"
seta r_sunShadows "0"

vid_restart
