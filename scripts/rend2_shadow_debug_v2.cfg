// Rend2 Shadow Infrastructure Debug v2
// Console:
//   /exec rend2_shadow_debug_v2.cfg

seta cl_renderer "rend2"

seta r_dlightMode "3"
seta r_dlightShadows "1"

seta r_dlightShadowMaxLights "2"
seta r_dlightShadowDebug "1"
seta r_dlightShadowDebugEvery "30"
seta r_dlightShadowMinRadius "32"
seta r_dlightShadowMinIntensity "0.05"
seta r_dlightShadowTorchOnly "0"
seta r_dlightShadowExplosions "1"
seta r_dlightShadowMuzzle "1"

seta r_normalMapping "1"
seta r_specularMapping "0"
seta r_parallaxMapping "1"
seta r_parallaxMapShadows "0"
seta r_pbr "0"

vid_restart
