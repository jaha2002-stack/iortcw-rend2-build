// Very experimental: fast dynamic sources such as explosions/muzzle.
// Expect flicker/artifacts. Use only for testing.
seta cl_renderer "rend2"
seta r_dlightMode "3"
seta r_dlightShadows "1"

seta r_dlightShadowMaxLights "1"
seta r_dlightShadowMapSize "256"
seta r_dlightShadowBias "0.006"
seta r_dlightShadowFilter "0"
seta r_dlightShadowDebug "0"
seta r_dlightShadowIntensity "1.0"
seta r_dlightShadowTorchOnly "0"
seta r_dlightShadowExplosions "1"
seta r_dlightShadowMuzzle "1"

seta r_normalMapping "1"
seta r_specularMapping "0"
seta r_parallaxMapping "1"
seta r_pbr "0"
seta r_pshadowDist "128"

vid_restart
