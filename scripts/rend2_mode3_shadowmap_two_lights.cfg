// Mode3 prototype, allow two selected dlights
seta cl_renderer "rend2"
seta r_dlightMode "3"
seta r_dlightShadows "1"

seta r_dlightShadowMaxLights "2"
seta r_dlightShadowMapSize "512"
seta r_dlightShadowBias "0.004"
seta r_dlightShadowFilter "1"
seta r_dlightShadowDebug "0"
seta r_dlightShadowIntensity "1.0"
seta r_dlightShadowTorchOnly "1"
seta r_dlightShadowExplosions "0"
seta r_dlightShadowMuzzle "0"

seta r_normalMapping "1"
seta r_specularMapping "0"
seta r_parallaxMapping "1"
seta r_parallaxMapShadows "0"
seta r_pbr "0"

seta r_pshadowDist "192"
seta r_hdr "1"
seta r_postProcess "1"
seta r_toneMap "1"
seta r_forceSun "0"
seta r_sunShadows "0"

vid_restart
