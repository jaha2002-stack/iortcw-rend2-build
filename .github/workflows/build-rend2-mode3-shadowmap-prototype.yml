name: Build Rend2 Mode3 ShadowMap Prototype Windows x64

on:
  workflow_dispatch:

jobs:
  build-windows-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout builder kit
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git make zip unzip python3 gcc-mingw-w64 g++-mingw-w64 mingw-w64

      - name: Checkout iortcw source
        run: |
          git clone --depth 1 https://github.com/iortcw/iortcw.git source

      - name: Apply mode3 shadow-map prototype patch
        run: |
          cp scripts/apply_mode3_shadowmap_prototype.py source/
          cd source
          python3 apply_mode3_shadowmap_prototype.py

      - name: Build Single Player Windows x64
        run: |
          cd source/SP
          chmod +x ./cross-make-mingw64.sh || true
          if [ -f ./cross-make-mingw64.sh ]; then
            ./cross-make-mingw64.sh
          else
            PLATFORM=mingw32 ARCH=x86_64 make
          fi

      - name: Build Multiplayer Windows x64
        run: |
          cd source/MP
          chmod +x ./cross-make-mingw64.sh || true
          if [ -f ./cross-make-mingw64.sh ]; then
            ./cross-make-mingw64.sh
          else
            PLATFORM=mingw32 ARCH=x86_64 make
          fi

      - name: Collect release files
        run: |
          mkdir -p release
          find source -type f \( -iname "*.exe" -o -iname "*.dll" \) | sort | while read f; do
            cp -v "$f" release/ || true
          done
          cp scripts/*.cfg release/
          cp docs/*.txt release/ || true
          cp scripts/apply_mode3_shadowmap_prototype.py release/
          cd release
          zip -9 -r ../iortcw-rend2-mode3-shadowmap-prototype-windows-x64.zip .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: iortcw-rend2-mode3-shadowmap-prototype-windows-x64
          path: iortcw-rend2-mode3-shadowmap-prototype-windows-x64.zip
