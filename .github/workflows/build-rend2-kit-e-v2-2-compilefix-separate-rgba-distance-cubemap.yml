name: Build Rend2 Kit E v2.2 COMPILE FIX Separate RGBA Distance Cubemap Shadows Windows x64

on:
  workflow_dispatch:

jobs:
  build-windows-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout builder kit
        uses: actions/checkout@v4

      - name: Verify Kit E v2.2 files
        run: |
          pwd
          find . -maxdepth 4 -type f | sort
          test -f scripts/apply_kit_d_shader_depth_compare_debug.py
          test -f scripts/fix_kit_d_multiple_definitions.py
          test -f scripts/apply_kit_e_v2_separate_rgba_distance_cubemap.py
          test -f scripts/fix_kit_e_v2_compile_errors.py
          test -f scripts/kit_e_v2_assets/dlight_fp.glsl
          test -f scripts/kit_e_v2_assets/shadowfill_fp.glsl
          test -f scripts/rend2_kit_e_v2_3_face_color_test.cfg
          test -f scripts/rend2_kit_e_v2_5_actual_shadow.cfg

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git make zip unzip python3 gcc-mingw-w64 g++-mingw-w64 mingw-w64

      - name: Checkout iortcw source
        run: |
          git clone --depth 1 https://github.com/iortcw/iortcw.git source

      - name: Apply Kit E v2.2 full patch
        run: |
          cp scripts/apply_kit_d_shader_depth_compare_debug.py source/
          cp scripts/fix_kit_d_multiple_definitions.py source/
          cp scripts/apply_kit_e_v2_separate_rgba_distance_cubemap.py source/
          cp scripts/fix_kit_e_v2_compile_errors.py source/
          cp -r scripts/kit_e_v2_assets source/
          cd source
          python3 apply_kit_d_shader_depth_compare_debug.py
          python3 fix_kit_d_multiple_definitions.py
          python3 apply_kit_e_v2_separate_rgba_distance_cubemap.py
          python3 fix_kit_d_multiple_definitions.py
          python3 fix_kit_e_v2_compile_errors.py
          grep -R "dlightDistanceCubemaps" SP/code/rend2 MP/code/rend2
          grep -R "LINEARCUBEDBG\|DLIGHTDISTDBG" SP/code/rend2 MP/code/rend2
          grep -n "r_dlightDistanceMapSize" SP/code/rend2/tr_init.c SP/code/rend2/tr_local.h MP/code/rend2/tr_init.c MP/code/rend2/tr_local.h

      - name: Build Single Player Windows x64
        run: |
          cd source/SP
          chmod +x ./cross-make-mingw64.sh || true
          if [ -f ./cross-make-mingw64.sh ]; then
            ./cross-make-mingw64.sh
          else
            PLATFORM=mingw32 ARCH=x86_64 make
          fi

      - name: Build Multiplayer Windows x64
        run: |
          cd source/MP
          chmod +x ./cross-make-mingw64.sh || true
          if [ -f ./cross-make-mingw64.sh ]; then
            ./cross-make-mingw64.sh
          else
            PLATFORM=mingw32 ARCH=x86_64 make
          fi

      - name: Collect release files
        run: |
          mkdir -p release
          find source -type f \( -iname "*.exe" -o -iname "*.dll" \) | sort | while read f; do
            cp -v "$f" release/ || true
          done
          cp scripts/*.cfg release/ || true
          cp docs/*.txt release/ || true
          cp README_RU.txt release/ || true
          cp IMPORTANT_RUN_ONLY_THIS_WORKFLOW.txt release/ || true
          cp scripts/apply_kit_d_shader_depth_compare_debug.py release/ || true
          cp scripts/fix_kit_d_multiple_definitions.py release/ || true
          cp scripts/apply_kit_e_v2_separate_rgba_distance_cubemap.py release/ || true
          cp scripts/fix_kit_e_v2_compile_errors.py release/ || true
          cd release
          zip -9 -r ../iortcw-rend2-kit-e-v2-2-compilefix-separate-rgba-distance-cubemap-windows-x64.zip .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: iortcw-rend2-kit-e-v2-2-compilefix-separate-rgba-distance-cubemap-windows-x64
          path: iortcw-rend2-kit-e-v2-2-compilefix-separate-rgba-distance-cubemap-windows-x64.zip
