name: Build Rend2 Kit E Linear Distance Cubemap Shadows Windows x64

on:
  workflow_dispatch:

jobs:
  build-windows-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout builder kit
        uses: actions/checkout@v4

      - name: Verify Kit E files
        run: |
          pwd
          find . -maxdepth 3 -type f | sort
          test -f scripts/apply_kit_e_linear_distance_cubemap_shadows.py
          test -f scripts/fix_kit_d_multiple_definitions.py
          grep -R "DecodePackedDistance24" scripts/apply_kit_e_linear_distance_cubemap_shadows.py
          grep -R "SHADOWFILL_FP_E" scripts/apply_kit_e_linear_distance_cubemap_shadows.py
          grep -R "GL_COLOR_ATTACHMENT0_EXT" scripts/apply_kit_e_linear_distance_cubemap_shadows.py

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git make zip unzip python3 gcc-mingw-w64 g++-mingw-w64 mingw-w64

      - name: Checkout iortcw source
        run: |
          git clone --depth 1 https://github.com/iortcw/iortcw.git source

      - name: Apply Kit E linear-distance cubemap shadow patch
        run: |
          cp scripts/apply_kit_e_linear_distance_cubemap_shadows.py source/
          cp scripts/fix_kit_d_multiple_definitions.py source/
          cd source
          python3 apply_kit_e_linear_distance_cubemap_shadows.py
          python3 fix_kit_d_multiple_definitions.py

      - name: Build Single Player Windows x64
        run: |
          cd source/SP
          chmod +x ./cross-make-mingw64.sh || true
          if [ -f ./cross-make-mingw64.sh ]; then
            ./cross-make-mingw64.sh
          else
            PLATFORM=mingw32 ARCH=x86_64 make
          fi

      - name: Build Multiplayer Windows x64
        run: |
          cd source/MP
          chmod +x ./cross-make-mingw64.sh || true
          if [ -f ./cross-make-mingw64.sh ]; then
            ./cross-make-mingw64.sh
          else
            PLATFORM=mingw32 ARCH=x86_64 make
          fi

      - name: Collect release files
        run: |
          mkdir -p release
          find source -type f \( -iname "*.exe" -o -iname "*.dll" \) | sort | while read f; do
            cp -v "$f" release/ || true
          done
          cp scripts/*.cfg release/ || true
          cp docs/*.txt release/ || true
          cp README_RU.txt release/ || true
          cp IMPORTANT_RUN_ONLY_THIS_WORKFLOW.txt release/ || true
          cp scripts/apply_kit_e_linear_distance_cubemap_shadows.py release/ || true
          cp scripts/fix_kit_d_multiple_definitions.py release/ || true
          cd release
          zip -9 -r ../iortcw-rend2-kit-e-linear-distance-cubemap-shadows-windows-x64.zip .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: iortcw-rend2-kit-e-linear-distance-cubemap-shadows-windows-x64
          path: iortcw-rend2-kit-e-linear-distance-cubemap-shadows-windows-x64.zip
