name: Build iortcw Rend2 dlightMode2 Experimental Windows x64

on:
  workflow_dispatch:

jobs:
  build-windows-x64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout builder kit
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git make zip unzip patch python3 gcc-mingw-w64 g++-mingw-w64 mingw-w64

      - name: Checkout iortcw source
        run: |
          git clone --depth 1 https://github.com/iortcw/iortcw.git source

      - name: Apply r_dlightMode 2 experimental patch
        run: |
          cp scripts/apply_dlightmode2_experimental_patch.py source/
          cd source
          python3 apply_dlightmode2_experimental_patch.py

      - name: Build Single Player Windows x64
        run: |
          cd source/SP
          chmod +x ./cross-make-mingw64.sh || true
          if [ -f ./cross-make-mingw64.sh ]; then
            ./cross-make-mingw64.sh
          else
            PLATFORM=mingw32 ARCH=x86_64 make
          fi

      - name: Build Multiplayer Windows x64
        run: |
          cd source/MP
          chmod +x ./cross-make-mingw64.sh || true
          if [ -f ./cross-make-mingw64.sh ]; then
            ./cross-make-mingw64.sh
          else
            PLATFORM=mingw32 ARCH=x86_64 make
          fi

      - name: Collect release files
        run: |
          mkdir -p release
          find source -type f \( -iname "*.exe" -o -iname "*.dll" \) | sort | while read f; do
            cp -v "$f" release/ || true
          done
          cp scripts/rend2_dlightmode2_experimental.cfg release/
          cp docs/*.txt release/ || true
          cp scripts/apply_dlightmode2_experimental_patch.py release/
          cd release
          zip -9 -r ../iortcw-rend2-dlightmode2-experimental-windows-x64.zip .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: iortcw-rend2-dlightmode2-experimental-windows-x64
          path: iortcw-rend2-dlightmode2-experimental-windows-x64.zip
